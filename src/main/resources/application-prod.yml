server:
  port: 8081

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  config:
    import: optional:file:.env[.properties]

  jwt:
    secret: ${JWT_SECRET}

  datasource:
    url: ${SPRING_DATASOURCE_PROD_URL}
    username: ${SPRING_DATASOURCE_PROD_USERNAME}
    password: ${SPRING_DATASOURCE_PROD_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        globally_quoted_identifiers: true
    database: postgresql

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/PostgreSQL

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: homepage-order-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "Homepage.practice.*"
        spring.json.value.default.type: Homepage.practice.Event.DTO.OrderPaidEvent

  security:
    oauth2:
      client:
        registration:
          google:
            clientName: google
            clientId: ${GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            authorizationGrantType: authorization_code
            redirectUri: ${APP_BASE_URL}/login/oauth2/code/google
            scope:
              - email
              - profile
          naver:
            clientName: naver
            clientId: ${NAVER_CLIENT_ID}
            clientSecret: ${NAVER_CLIENT_SECRET}
            authorizationGrantType: authorization_code
            redirectUri: ${APP_BASE_URL}/login/oauth2/code/naver
            scope:
              - email
              - profile
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

app:
  kafka:
    topics:
      order-paid: order.paid

payment:
  mock:
    base-url: ${APP_BASE_URL}/public/mock-payments

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.springframework.security: warn
    org.springframework.web: warn