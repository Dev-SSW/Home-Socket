# application-performance.yml
# Server Port 번호
server:
  port: 8081

# 스프링 설정 관련
spring:
  # 404 URL_NOT_FOUND 예외 처리를 위한 설정
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # .env 설정, 이를 설정함으로써 메인 애플리케이션 클래스에 입력값들을 명시하지 않아도 됨
  config:
    import: optional:file:.env[.properties]

  # jwt 키 설정
  jwt:
    secret: ${JWT_SECRET}

  # DB 설정
  datasource:
    url: ${SPRING_DATASOURCE_URL3}
    username: ${SPRING_DATASOURCE_USERNAME3}
    password: ${SPRING_DATASOURCE_PASSWORD3}
    driver-class-name: org.postgresql.Driver

  # 출력 창에 나타낼 출력 코드에 대한 정렬 및 DB 생성 방법 관련
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true                    # SQL 포맷
        use_sql_comments: true
        highlight_sql: true                 # 가독성 (컬러)
        dialect: org.hibernate.dialect.PostgreSQLDialect
        globally_quoted_identifiers: true   # 테이블/컬럼명 자동 인용
    show-sql: true
    database: postgresql

  flyway:
    enabled: true
    validate-on-migrate: false
    locations:
      - classpath:db/migration/PostgreSQL

# 출력 창에 나타날 출력 코드에 대한 포맷
logging.level:
  root: info                                               # 전체 기본 레벨
  org.hibernate.SQL: debug                      # sql 로그
  org.springframework.security: debug    # 인증/인가 요청
  org.springframework.web: debug          # web 요청
