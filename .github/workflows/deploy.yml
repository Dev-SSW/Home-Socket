name: CI/CD Deploy

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

concurrency:
  group: home-socket-production
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Upload JAR artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/practice-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.OCI_HOST }}" || (echo "OCI_HOST is empty" && exit 1)
          test -n "${{ secrets.OCI_USER }}" || (echo "OCI_USER is empty" && exit 1)
          test -n "${{ secrets.OCI_SSH_KEY }}" || (echo "OCI_SSH_KEY is empty" && exit 1)
          test -n "${{ secrets.APP_DIR }}" || (echo "APP_DIR is empty" && exit 1)

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp -i ~/.ssh/oci_key \
            ./artifact/practice-0.0.1-SNAPSHOT.jar \
            ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:${{ secrets.APP_DIR }}/practice-0.0.1-SNAPSHOT.jar.new

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/oci_key ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'EOF'
            set -e

            APP_DIR="/home/ubuntu/home-socket"
            JAR_NAME="practice-0.0.1-SNAPSHOT.jar"

            cd "$APP_DIR"

            echo "Backup current JAR"
            if [ -f "$JAR_NAME" ]; then
              cp "$JAR_NAME" "${JAR_NAME}.bak"
            fi

            echo "Replace JAR"
            mv "${JAR_NAME}.new" "$JAR_NAME"

            echo "Rebuild app image and recreate app container"
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate app

            echo "Container status"
            docker compose -f docker-compose.prod.yml ps

            echo "Wait for app startup"
            for i in {1..60}; do
              if curl --max-time 5 -f -s -o /dev/null http://127.0.0.1:8081/v3/api-docs; then
                echo "Health check success"
                break
              fi

              echo "Waiting for app... attempt $i/60"
              sleep 5

              if [ "$i" -eq 60 ]; then
                echo "Health check failed. App logs:"
                docker compose -f docker-compose.prod.yml logs --tail=300 app

                echo "Rolling back."
                if [ -f "${JAR_NAME}.bak" ]; then
                  cp "${JAR_NAME}.bak" "$JAR_NAME"
                  docker compose -f docker-compose.prod.yml up -d --build --force-recreate app
                fi

                exit 1
              fi
            done

            echo "Recent app logs"
            docker compose -f docker-compose.prod.yml logs --tail=100 app

            echo "Clean unused Docker images"
            docker image prune -f

            echo "Deploy complete"
          EOF
